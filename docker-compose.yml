version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleartoo-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_NAME=Cleartoo
      - APP_ENV=local
      - APP_KEY=base64:WrvqXJ+ilWOLItqI7C2N2R2dQkqFAHFYzTrQBBJqtso=
    volumes:
      - .:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
    networks:
      - cleartoo-network

  db:
    image: mysql:5.7
    container_name: cleartoo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bvcheadcenter_db
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - cleartoo-network

networks:
  cleartoo-network:
    driver: bridge

volumes:
  db-data:
